[[launcher]]
id = "launcher.uv.run"
exe = "uv"
[launcher.match]
argv1_in = ["run"]
min_argv = 3
[[launcher.step]]
kind = "first_non_flag"
start_index = 2
flags_with_value = ["--with", "--package", "-p", "--python", "--from", "--extra", "--group", "--only-group", "--directory", "-C"]

[[launcher]]
id = "launcher.uv.tool.run"
exe = "uv"
[launcher.match]
argv_prefix = ["tool", "run"]
min_argv = 4
[[launcher.step]]
kind = "first_non_flag_after_prefix"
flags_with_value = ["--with", "--package", "-p", "--python", "--from", "--extra", "--group", "--only-group", "--directory", "-C"]

[[launcher]]
id = "launcher.uv.tool.uvx"
exe = "uv"
[launcher.match]
argv_prefix = ["tool", "uvx"]
min_argv = 4
[[launcher.step]]
kind = "first_non_flag_after_prefix"
flags_with_value = ["--with", "--package", "-p", "--python", "--from", "--extra", "--group", "--only-group", "--directory", "-C"]

[[launcher]]
id = "launcher.uvx"
exe = "uvx"
[[launcher.step]]
kind = "first_non_flag"
start_index = 1
flags_with_value = ["--with", "--package", "-p", "--python", "--from", "--extra", "--group", "--only-group", "--directory", "-C"]

[[launcher]]
id = "launcher.npm"
exe = "npm"
[launcher.match]
argv1_in = ["exec", "run", "x"]
min_argv = 3
[[launcher.step]]
kind = "first_non_flag"
start_index = 2
flags_with_value = ["--workspace", "-w"]
[launcher.transform]
strip_npm_scope = true

[[launcher]]
id = "launcher.npx"
exe = "npx"
[[launcher.step]]
kind = "first_non_flag"
start_index = 1
[launcher.transform]
strip_npm_scope = true

[[launcher]]
id = "launcher.java"
exe = "java"
[[launcher.step]]
kind = "next_after_flag"
flag = "-jar"
[[launcher.step]]
kind = "first_non_flag"
start_index = 1
flags_with_value = ["-cp", "-classpath", "--class-path", "-p", "--module-path", "--add-modules", "--module", "-m", "--add-opens", "--add-exports", "--add-reads", "-javaagent"]
[launcher.transform]
java_class_tail = true

[[launcher]]
id = "launcher.go.run"
exe = "go"
[launcher.match]
argv1_in = ["run"]
min_argv = 3
[[launcher.step]]
kind = "first_non_flag"
start_index = 2
