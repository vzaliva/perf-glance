schema_version = 1

# ─── Desktop additions ──────────────────────────────────────────────────────
# More widget extensions and wallpaper extension processes not caught by the
# main macOS Desktop rule (same name → they merge in the display).
[[system_category]]
id = "sys.macos_desktop_widgets"
name = "macOS Desktop"
exe = [
  # Calendar / Reminders / Contacts widgets
  "CalendarWidgetExtension",
  "calendarwidgetextension",
  "RemindersWidgetExtension",
  "reminderswidgetextension",
  "PeopleWidget_macOSExtension",
  "peoplewidget_macosextension",
  "PhotosReliveWidget",
  "photosrelivewidget",
  "TipsWidgetExtension",
  "tipswidgetextension",

  # Safari link/extension helpers (used by widget host)
  "SafariWidgetExtension",
  "safariwidgetextension",
  "SafariLinkExtension",
  "safarilinkextension",

  # Wallpaper extension host processes (macOS Sonoma+)
  "WallpaperLegacyExtension",
  "wallpaperlegacyextension",
  "WallpaperDynamicExtension",
  "wallpaperdynamicextension",
  "WallpaperImageExtension",
  "wallpaperimageextension",
  "WallpaperAerialsExtension",
  "wallpaperaerialsextension",
  "WallpaperGradientExtension",
  "wallpapergradientextension",
  "WallpaperSequoiaExtension",
  "wallpapersequoiaextension",
  "WallpaperMacintoshExtension",
  "wallpapermacintoshextension",
  "WallpaperSonomaExtension",
  "wallpapersonomaextension",
  "WallpaperControlsExtension",
  "wallpapercontrolsextension",
  "NeptuneOneWallpaper",
  "neptuneonewallpaper",

  # Thumbnail / quick-look helpers
  "ImageThumbnailExtension",
  "imagethumbnailextension",
  "ViewBridgeAuxiliary",
  "viewbridgeauxiliary",

  # Tips / onboarding
  "tipsd",

  # Background task management (macOS 13+)
  "BackgroundTaskManagementAgent",
  "backgroundtaskmanagementagent",
  "backgroundtaskmanagementd",

  # Image Capture helper
  "icdd",

  # Contacts CoreSpotlight indexer (desktop-level extension)
  "ContactsCoreSpotlightExtension",
  "contactscorespotlightextension",
]

# ─── AI additions ───────────────────────────────────────────────────────────
[[system_category]]
id = "sys.macos_ai_ext"
name = "macOS Siri & AI"
exe = [
  # Siri analytics / suggestions bookkeeping
  "SAExtensionOrchestrator",
  "saextensionorchestrator",
  "SiriSuggestionsBookkeepingService",
  "sirisuggestionsbookkeepingservice",

  # Generative safety inference (Apple Intelligence content policy)
  "GenerativeExperiencesSafetyInferenceProvider",
  "generativeexperiencessafetyinferenceprovider",

  # Apple Neural Engine / on-device inference
  "TGOnDeviceInferenceProviderService",
  "tgondeviceinferenceproviderservice",
  "aneuserd",
  "aned",
  "modelmanagerd",
  "modelcatalogd",
  "ANECompilerService",
  "anecompilerservice",

  # DAScheduler — schedules intelligence workloads
  "dasd",

  # On-device translation
  "translationd",

  # Recents / content linking (used by Siri & Spotlight suggestions)
  "recentsd",
  "contentlinkingd",
]

